services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: nordic_devices_proveeksamen-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: nordic_devices_proveeksamen
      MYSQL_USER: not_root
      MYSQL_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "not_root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: nordic_devices_proveeksamen-backend
    restart: unless-stopped
    ports:
      - "6767:6767"
    environment:
      NODE_ENV: production
      PORT: 6767
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: nordic_devices_proveeksamen
      DB_USER: not_root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY}
      RESERVATION_RETENTION_DAYS: ${RESERVATION_RETENTION_DAYS:-1}
    depends_on:
      db:
        condition: service_healthy

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: nordic_devices_proveeksamen-frontend
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: nordic_devices-proveeksamen-bhl-network
    driver: bridge
