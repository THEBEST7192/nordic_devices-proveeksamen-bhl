services:
  # MySQL Database
  db-dev:
    image: mysql:8.0
    container_name: nordic_devices_proveeksamen-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-devpassword}
      MYSQL_DATABASE: nordic_devices_proveeksamen_dev
      MYSQL_USER: not_root
      MYSQL_PASSWORD: ${DB_ROOT_PASSWORD:-devpassword}
    volumes:
      - mysql_dev_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "not_root", "-p${DB_ROOT_PASSWORD:-devpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Utviklings Service
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    container_name: nordic_devices_proveeksamen-backend-dev
    restart: unless-stopped
    ports:
      - "6768:6768"
    environment:
      NODE_ENV: development
      PORT: 6768
      DB_HOST: db-dev
      DB_PORT: 3306
      DB_NAME: nordic_devices_proveeksamen_dev
      DB_USER: not_root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-devpassword}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY}
      RESERVATION_RETENTION_DAYS: ${RESERVATION_RETENTION_DAYS:-1}
    volumes:
      - ./server:/app/server
      - ./server/package.json:/app/server/package.json
      - ./server/package-lock.json:/app/server/package-lock.json
    depends_on:
      db-dev:
        condition: service_healthy

  # Frontend Utviklings Service
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: nordic_devices_proveeksamen-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vite standard port
    volumes:
      - .:/app
      - node_modules:/app/node_modules  # Navngitt volum for node_modules
      - dist:/app/dist  # Navngitt volum for bygg-artefakter
    depends_on:
      - backend-dev

volumes:
  mysql_dev_data:
    driver: local
  node_modules:
    driver: local
    labels:
      - "com.nettside-mal.description=Frontend node_modules"
  dist:
    driver: local
    labels:
      - "com.nettside-mal.description=Frontend build artifacts"

networks:
  default:
    name: nordic_devices-proveeksamen-bhl-dev-network
    driver: bridge
